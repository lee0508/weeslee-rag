server {
    listen 9284;
    server_name server.weeslee.co.kr 192.168.0.207;

    client_max_body_size 500M;

    # SSE(Server-Sent Events) 스트리밍 — 파이프라인 로그용
    location ~* ^/weeslee-rag/api/.*/stream {
        rewrite ^/weeslee-rag/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
        proxy_send_timeout 600;

        add_header X-Accel-Buffering no;
    }

    # /weeslee-rag/api/ → FastAPI /api/ 로 rewrite
    location ^~ /weeslee-rag/api/ {
        rewrite ^/weeslee-rag/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # 그 외 모든 요청 (정적 파일 포함) FastAPI로 프록시
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
