<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAISS Index Management Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B3A6B;
      --navy-dark: #122a52;
      --navy-light: #2a5298;
      --amber: #E8971F;
      --bg: #0f1923;
      --surface: #162032;
      --surface2: #1e2d42;
      --border: rgba(255,255,255,.08);
      --text: #e8edf4;
      --muted: #7a90aa;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--navy-dark);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    .tag {
      font-size: 11px; background: var(--amber); color: #000;
      padding: 2px 8px; border-radius: 99px; font-weight: 700;
    }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .api-status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .api-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .api-status.ok .dot { background: var(--green); }
    .api-status.err .dot { background: var(--red); }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: calc(100vh - 53px);
    }
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .main {
      overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .card-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-badge {
      font-size: 10px; background: var(--navy-light); color: #fff;
      padding: 1px 7px; border-radius: 99px; font-weight: 600;
      letter-spacing: 0; text-transform: none;
    }

    .status-snapshot {
      font-size: 13px; font-weight: 600; word-break: break-all; margin-bottom: 10px;
    }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--muted);
      padding: 4px 0; border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { color: var(--text); font-weight: 600; }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600;
    }
    .pill.green { background: rgba(34,197,94,.15); color: var(--green); }
    .pill.red   { background: rgba(239,68,68,.15);  color: var(--red); }
    .pill.amber { background: rgba(232,151,31,.15); color: var(--amber); }

    .index-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; margin-bottom: 8px;
    }
    .index-item:last-child { margin-bottom: 0; }
    .index-item.active-idx { border-color: var(--amber); }
    .index-name { font-size: 12px; font-weight: 600; word-break: break-all; margin-bottom: 6px; }
    .index-chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .chip {
      font-size: 11px; color: var(--muted); background: rgba(255,255,255,.06);
      padding: 1px 6px; border-radius: 4px;
    }
    .index-actions { margin-top: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 32px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary   { background: var(--amber); color: #000; }
    .btn-secondary { background: var(--navy-light); color: #fff; }
    .btn-outline   { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { height: 26px; padding: 0 10px; font-size: 11px; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    input[type="text"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 13px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--navy-light); }

    .progress-wrap { margin-top: 14px; }
    .progress-track {
      height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--navy-light), var(--amber));
      border-radius: 99px; transition: width .4s ease; width: 0%;
    }
    .progress-meta { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
    .progress-pct { font-weight: 700; color: var(--amber); }

    .log-box {
      margin-top: 10px; background: #0a1117; border: 1px solid var(--border);
      border-radius: 6px; padding: 10px; max-height: 260px; overflow-y: auto;
      font-family: 'Consolas', monospace; font-size: 11px; color: #8fb3d5; line-height: 1.6;
    }
    .log-err { color: var(--red); }

    .job-row {
      display: grid; grid-template-columns: 80px 1fr 90px 70px;
      gap: 8px; align-items: center; padding: 7px 10px;
      border-radius: 6px; font-size: 12px; border-bottom: 1px solid var(--border);
    }
    .job-row:last-child { border-bottom: none; }
    .job-id { font-family: monospace; color: var(--muted); }

    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }

    .icon-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 0 4px;
    }
    .icon-btn:hover { color: var(--text); }

    /* ── Benchmark table ── */
    .bm-summary {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .bm-stat {
      background: var(--surface2); border-radius: 8px; padding: 10px 14px; text-align: center;
    }
    .bm-stat .val { font-size: 22px; font-weight: 700; }
    .bm-stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .bm-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .bm-table th {
      text-align: left; padding: 5px 8px; color: var(--muted);
      border-bottom: 1px solid var(--border); font-weight: 600;
    }
    .bm-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
    .bm-table tr:last-child td { border-bottom: none; }
    .bm-table tr:hover td { background: var(--surface2); }
    .pass-badge  { color: var(--green); font-weight: 700; }
    .fail-badge  { color: var(--red);   font-weight: 700; }

    /* ── Ollama status ── */
    .ollama-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--border);
    }
    .ollama-row:last-child { border-bottom: none; }

    /* ── Category pills row ── */
    .cat-row {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
    }
    .cat-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 99px;
      font-weight: 600; display: flex; align-items: center; gap: 3px;
    }
    .cat-pill.ok  { background: rgba(34,197,94,.15); color: var(--green); }
    .cat-pill.no  { background: rgba(239,68,68,.12);  color: var(--red); }
  </style>
</head>
<body>

<header>
  <h1>FAISS Index Management Console</h1>
  <span class="tag">ADMIN</span>
  <div class="header-right">
    <span class="api-status" id="apiStatus">
      <span class="dot"></span>
      <span id="apiStatusText">연결 확인 중...</span>
    </span>
    <button class="btn btn-outline btn-sm" onclick="refreshAll()">↻ 새로고침</button>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Active Index Status -->
    <div class="card">
      <div class="card-title">
        활성 인덱스
        <span class="card-badge" id="activeTag">-</span>
      </div>
      <div id="activeContent"><div class="empty">로딩 중...</div></div>
    </div>

    <!-- Ollama Status -->
    <div class="card">
      <div class="card-title">
        Ollama 상태
        <button class="icon-btn" onclick="loadOllama()" title="새로고침">↻</button>
      </div>
      <div id="ollamaContent"><div class="empty">로딩 중...</div></div>
    </div>

    <!-- Category Index Status -->
    <div class="card">
      <div class="card-title">
        카테고리 인덱스
        <button class="icon-btn" onclick="loadCategoryStatus()" title="새로고침">↻</button>
      </div>
      <div id="categoryContent"><div class="empty">로딩 중...</div></div>
    </div>

    <!-- Run Pipeline -->
    <div class="card">
      <div class="card-title">파이프라인 실행</div>
      <div class="form-group">
        <label>스냅샷 이름</label>
        <input type="text" id="jobSnapshot"
          placeholder="snapshot_YYYY-MM-DD_batch-XXX-vN">
      </div>
      <button class="btn btn-primary" id="runBtn" onclick="startJob()" style="width:100%">
        ▶ 파이프라인 시작
      </button>
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-meta">
          <span id="progressStage">-</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Index List -->
    <div class="card">
      <div class="card-title">
        사용 가능한 인덱스
        <button class="icon-btn" onclick="loadIndexes()" title="새로고침">↻</button>
      </div>
      <div id="indexList"><div class="empty">로딩 중...</div></div>
    </div>

    <!-- Job History -->
    <div class="card">
      <div class="card-title">
        잡 이력
        <button class="icon-btn" onclick="loadJobs()" title="새로고침">↻</button>
      </div>
      <div id="jobList"><div class="empty">실행된 잡 없음</div></div>
    </div>

    <!-- Benchmark -->
    <div class="card">
      <div class="card-title">검색 품질 벤치마크</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <button class="btn btn-secondary" id="bmBtn" onclick="runBenchmark()">▶ Run Benchmark</button>
        <span id="bmRunning" style="display:none;font-size:12px;color:var(--amber)">실행 중... (search_only 모드)</span>
      </div>
      <div id="bmResults"></div>
    </div>

  </main>
</div>

<script>
  const API_BASE = 'http://192.168.0.207:8080/api';

  // ── API ──────────────────────────────────────────────────────────────────

  async function api(path, opts = {}) {
    const r = await fetch(API_BASE + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    return r.json();
  }

  function setApiStatus(ok) {
    const el = document.getElementById('apiStatus');
    el.className = 'api-status ' + (ok ? 'ok' : 'err');
    document.getElementById('apiStatusText').textContent = ok ? '서버 연결됨' : '서버 연결 실패';
  }

  // ── Status ───────────────────────────────────────────────────────────────

  async function loadStatus() {
    try {
      const data = await api('/admin/faiss/status');
      setApiStatus(true);
      renderStatus(data);
    } catch (e) {
      setApiStatus(false);
      document.getElementById('activeContent').innerHTML =
        `<div class="empty" style="color:var(--red)">${esc(e.message)}</div>`;
    }
  }

  function renderStatus({ active, stats }) {
    const tag = document.getElementById('activeTag');
    const el  = document.getElementById('activeContent');

    if (!active) {
      tag.textContent = '없음';
      el.innerHTML = '<div class="empty">활성 인덱스 없음</div>';
      return;
    }

    const s = stats || {};
    tag.textContent = s.index_exists ? '정상' : '파일 없음';
    tag.style.background = s.index_exists ? 'var(--green)' : 'var(--red)';

    const at = (active.activated_at || '').replace('T', ' ').slice(0, 19);
    el.innerHTML = `
      <div class="status-snapshot">${esc(active.snapshot)}</div>
      <div class="stat-row"><span>인덱스 파일</span>
        <span class="stat-val">${mkpill(s.index_exists, s.index_exists ? '존재' : '없음')}</span></div>
      <div class="stat-row"><span>메타데이터</span>
        <span class="stat-val">${mkpill(s.metadata_exists, s.metadata_exists ? '존재' : '없음')}</span></div>
      <div class="stat-row"><span>인덱스 크기</span>
        <span class="stat-val">${s.index_size_mb ?? 0} MB</span></div>
      <div class="stat-row"><span>청크 수</span>
        <span class="stat-val">${(s.chunk_count ?? 0).toLocaleString()}</span></div>
      <div class="stat-row"><span>활성화 시각</span>
        <span class="stat-val">${at || '-'}</span></div>
    `;
  }

  function mkpill(ok, label) {
    return `<span class="pill ${ok ? 'green' : 'red'}">${esc(label)}</span>`;
  }

  // ── Indexes ───────────────────────────────────────────────────────────────

  async function loadIndexes() {
    try {
      const data = await api('/admin/faiss/indexes');
      renderIndexes(data.indexes || []);
    } catch (e) {
      document.getElementById('indexList').innerHTML =
        `<div class="empty" style="color:var(--red)">${esc(e.message)}</div>`;
    }
  }

  function renderIndexes(indexes) {
    const el = document.getElementById('indexList');
    if (!indexes.length) {
      el.innerHTML = '<div class="empty">인덱스 없음 (파이프라인 실행 후 생성됩니다)</div>';
      return;
    }
    el.innerHTML = indexes.map(idx => `
      <div class="index-item ${idx.is_active ? 'active-idx' : ''}">
        <div class="index-name">${esc(idx.snapshot)}</div>
        <div class="index-chips">
          ${idx.is_active ? '<span class="pill amber">● 활성</span>' : ''}
          <span class="chip">${idx.index_size_mb} MB</span>
          <span class="chip">${idx.chunk_count.toLocaleString()} chunks</span>
          <span class="chip" style="color:${idx.index_exists ? 'var(--green)' : 'var(--red)'}">
            ${idx.index_exists ? '인덱스 OK' : '인덱스 없음'}
          </span>
        </div>
        ${!idx.is_active && idx.index_exists ? `
        <div class="index-actions">
          <button class="btn btn-secondary btn-sm"
            onclick="activateIndex('${esc(idx.snapshot)}')">Activate</button>
        </div>` : ''}
      </div>
    `).join('');
  }

  async function activateIndex(snapshot) {
    if (!confirm(`"${snapshot}"\n을(를) 활성 인덱스로 설정하시겠습니까?\n이후 모든 RAG 쿼리에 이 인덱스가 사용됩니다.`)) return;
    try {
      await api('/admin/faiss/activate', {
        method: 'POST',
        body: JSON.stringify({ snapshot }),
      });
      alert('활성화 완료');
      refreshAll();
    } catch (e) {
      alert('활성화 실패: ' + e.message);
    }
  }

  // ── Jobs ──────────────────────────────────────────────────────────────────

  async function loadJobs() {
    try {
      const data = await api('/admin/faiss/jobs');
      renderJobs(data.jobs || []);
    } catch (e) {
      document.getElementById('jobList').innerHTML =
        `<div class="empty" style="color:var(--red)">${esc(e.message)}</div>`;
    }
  }

  function renderJobs(jobs) {
    const el = document.getElementById('jobList');
    if (!jobs.length) {
      el.innerHTML = '<div class="empty">실행된 잡 없음</div>';
      return;
    }
    const color = { completed: 'var(--green)', failed: 'var(--red)', running: 'var(--amber)' };
    el.innerHTML = jobs.map(j => `
      <div class="job-row">
        <span class="job-id">#${esc(j.job_id)}</span>
        <span style="word-break:break-all;font-size:11px">${esc(j.snapshot)}</span>
        <span style="color:${color[j.status] || 'var(--muted)'};font-weight:700">${esc(j.status)}</span>
        <span style="color:var(--muted)">${j.progress}%</span>
      </div>
    `).join('');
  }

  // ── Pipeline ──────────────────────────────────────────────────────────────

  let _sseSource = null;

  async function startJob() {
    const snapshot = document.getElementById('jobSnapshot').value.trim();
    if (!snapshot) { alert('스냅샷 이름을 입력하세요.'); return; }

    document.getElementById('runBtn').disabled = true;
    document.getElementById('progressWrap').style.display = '';
    setProgress(0, '잡 시작 중...');
    clearLog();

    try {
      const data = await api('/admin/faiss/jobs', {
        method: 'POST',
        body: JSON.stringify({ snapshot }),
      });
      streamJob(data.job_id);
    } catch (e) {
      alert('잡 시작 실패: ' + e.message);
      document.getElementById('runBtn').disabled = false;
    }
  }

  function streamJob(jobId) {
    if (_sseSource) _sseSource.close();
    _sseSource = new EventSource(`${API_BASE}/admin/faiss/jobs/${jobId}/stream`);

    _sseSource.onmessage = (e) => {
      const ev = JSON.parse(e.data);
      if (ev.heartbeat) return;
      if (ev.progress !== undefined) setProgress(ev.progress, ev.stage || '');
      if (ev.log) appendLog(ev.log, (ev.stage || '').startsWith('오류'));
      if (ev.done) {
        _sseSource.close();
        document.getElementById('runBtn').disabled = false;
        if (ev.error) appendLog('실패: ' + ev.error, true);
        else          appendLog('✓ 파이프라인 완료');
        loadJobs();
        loadIndexes();
        loadStatus();
      }
    };

    _sseSource.onerror = () => {
      _sseSource.close();
      document.getElementById('runBtn').disabled = false;
      appendLog('SSE 연결 오류', true);
    };
  }

  function setProgress(pct, stage) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressStage').textContent = stage;
  }

  function clearLog() { document.getElementById('logBox').innerHTML = ''; }

  function appendLog(text, isErr = false) {
    const box = document.getElementById('logBox');
    const span = document.createElement('span');
    if (isErr) span.className = 'log-err';
    span.textContent = text;
    box.appendChild(span);
    box.appendChild(document.createElement('br'));
    box.scrollTop = box.scrollHeight;
  }

  // ── Utilities ─────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;');
  }

  // ── Ollama ───────────────────────────────────────────────────────────────

  async function loadOllama() {
    const el = document.getElementById('ollamaContent');
    try {
      const data = await api('/health/ollama');
      const ok = data.status === 'healthy';
      const models = (data.models || []).join(', ') || '-';
      el.innerHTML = `
        <div class="ollama-row"><span>상태</span>
          <span class="stat-val">${mkpill(ok, ok ? 'running' : 'disconnected')}</span></div>
        <div class="ollama-row"><span>모델</span>
          <span class="stat-val" style="font-size:11px;text-align:right">${esc(models)}</span></div>
        ${data.error ? `<div class="ollama-row" style="color:var(--red);font-size:11px">${esc(data.error)}</div>` : ''}
      `;
    } catch (e) {
      el.innerHTML = `<div class="empty" style="color:var(--red)">${esc(e.message)}</div>`;
    }
  }

  // ── Category Status ───────────────────────────────────────────────────────

  async function loadCategoryStatus() {
    const el = document.getElementById('categoryContent');
    try {
      const data = await api('/admin/faiss/category-status');
      if (!data.snapshot) {
        el.innerHTML = '<div class="empty">활성 인덱스 없음</div>';
        return;
      }
      const pills = (data.categories || []).map(c => `
        <span class="cat-pill ${c.exists ? 'ok' : 'no'}">
          ${c.exists ? '✓' : '✗'} ${esc(c.category)}
          ${c.exists ? `<span style="opacity:.6">${c.size_mb}MB</span>` : ''}
        </span>
      `).join('');
      el.innerHTML = `
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${esc(data.snapshot)}</div>
        <div class="cat-row">${pills}</div>
      `;
    } catch (e) {
      el.innerHTML = `<div class="empty" style="color:var(--red)">${esc(e.message)}</div>`;
    }
  }

  // ── Benchmark ─────────────────────────────────────────────────────────────

  async function runBenchmark() {
    document.getElementById('bmBtn').disabled = true;
    document.getElementById('bmRunning').style.display = '';
    document.getElementById('bmResults').innerHTML = '';
    try {
      const data = await api('/admin/faiss/benchmark', { method: 'POST' });
      renderBenchmark(data);
    } catch (e) {
      document.getElementById('bmResults').innerHTML =
        `<div class="empty" style="color:var(--red)">${esc(e.message)}</div>`;
    } finally {
      document.getElementById('bmBtn').disabled = false;
      document.getElementById('bmRunning').style.display = 'none';
    }
  }

  function renderBenchmark(data) {
    const el = document.getElementById('bmResults');
    const s = data.summary || {};
    const results = data.results || [];

    const passColor = s.pass_rate >= 0.8 ? 'var(--green)' : s.pass_rate >= 0.6 ? 'var(--amber)' : 'var(--red)';

    const summaryHtml = `
      <div class="bm-summary">
        <div class="bm-stat">
          <div class="val" style="color:${passColor}">${Math.round((s.pass_rate||0)*100)}%</div>
          <div class="lbl">통과율</div>
        </div>
        <div class="bm-stat">
          <div class="val" style="color:var(--green)">${s.passed ?? 0}</div>
          <div class="lbl">통과</div>
        </div>
        <div class="bm-stat">
          <div class="val" style="color:var(--red)">${s.failed ?? 0}</div>
          <div class="lbl">실패</div>
        </div>
        <div class="bm-stat">
          <div class="val">${Math.round((s.avg_kw_score||0)*100)}%</div>
          <div class="lbl">평균 키워드</div>
        </div>
        <div class="bm-stat">
          <div class="val" style="font-size:14px">${(s.run_at||'').slice(0,19).replace('T',' ')}</div>
          <div class="lbl">실행 시각</div>
        </div>
      </div>
    `;

    const rows = results.map(r => `
      <tr>
        <td><span class="chip">${esc(r.category)}</span></td>
        <td style="max-width:260px;word-break:break-all">${esc(r.query)}</td>
        <td style="text-align:center">${r.kw_hits}/${r.kw_total}</td>
        <td style="text-align:center">${Math.round(r.kw_score*100)}%</td>
        <td style="text-align:center">${r.doc_count}</td>
        <td style="text-align:center">
          <span class="${r.pass ? 'pass-badge' : 'fail-badge'}">${r.pass ? 'PASS' : 'FAIL'}</span>
        </td>
      </tr>
    `).join('');

    el.innerHTML = summaryHtml + `
      <div style="overflow-x:auto">
        <table class="bm-table">
          <thead>
            <tr>
              <th>카테고리</th><th>쿼리</th><th>KW 적중</th><th>KW 점수</th><th>문서 수</th><th>결과</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function refreshAll() { loadStatus(); loadIndexes(); loadJobs(); loadOllama(); loadCategoryStatus(); }

  // Init
  refreshAll();
</script>
</body>
</html>
